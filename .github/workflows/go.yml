name: Go Check

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/go.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/go.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Install dependencies
      run: go mod download

    - name: Verify formatting
      run: if [ -n "$(gofmt -l .)" ]; then echo "Go code is not formatted, please run 'gofmt -w .'"; exit 1; fi

    - name: Vet
      run: go vet ./...

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
